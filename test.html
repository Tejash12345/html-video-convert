<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML rendering test page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0f1015;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Ambient glow background */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, #6366f1 0%, transparent 70%);
      filter: blur(50px);
      opacity: 0.5;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .container {
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: -1px;
      font-weight: 800;
      background: linear-gradient(90deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 1. CSS Keyframe Animation Circle */
    .rotating-orbit {
      width: 160px;
      height: 160px;
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 50%;
      position: relative;
      animation: spin 6s linear infinite;
    }

    .planet {
      width: 24px;
      height: 24px;
      background: #06b6d4;
      border-radius: 50%;
      position: absolute;
      top: -12px;
      left: 68px;
      box-shadow: 0 0 15px #06b6d4;
      animation: pulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      from { transform: scale(0.9); filter: brightness(0.9); }
      to { transform: scale(1.1); filter: brightness(1.2); }
    }

    /* 2. Custom requestAnimationFrame JS cube */
    .js-cube {
      width: 50px;
      height: 50px;
      background: #8b5cf6;
      border-radius: 10px;
      box-shadow: 0 0 15px #8b5cf6;
    }

    /* 3. setTimeout status text */
    .status-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #9ca3af;
      height: 24px;
    }
  </style>
  <!-- Load GSAP CDN to test timeline control -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
  <div class="glow"></div>
  
  <div class="container">
    <h1 id="title">HTML RENDER TESTING</h1>
    
    <!-- CSS Animation Test -->
    <div class="rotating-orbit">
      <div class="planet"></div>
    </div>
    
    <!-- requestAnimationFrame (JS) Test -->
    <div class="js-cube" id="js-cube"></div>
    
    <!-- setTimeout Test -->
    <div class="status-text" id="status-text">Ready...</div>
  </div>

  <script>
    // 1. GSAP animation test (animates header title scale and color)
    gsap.fromTo("#title", 
      { scale: 0.5, opacity: 0 },
      { scale: 1.1, opacity: 1, duration: 2, ease: "power2.out", repeat: -1, yoyo: true }
    );

    // 2. Custom requestAnimationFrame animation loop test (rotates and scales the cube)
    const cube = document.getElementById('js-cube');
    let angle = 0;
    
    function animateCube(timestamp) {
      angle += 0.05; // speed independent if using raw increments, or using performance.now()
      
      // Let's make it time-based using performance.now() to ensure it renders correctly under frame stepping
      const time = performance.now() / 1000; // in seconds
      
      const scale = 1 + Math.sin(time * 3) * 0.2;
      const rot = time * 90; // 90 degrees per second
      
      cube.style.transform = `rotate(${rot}deg) scale(${scale})`;
      
      requestAnimationFrame(animateCube);
    }
    requestAnimationFrame(animateCube);

    // 3. setTimeout test
    setTimeout(() => {
      document.getElementById('status-text').textContent = "Step 1: Initialized! (2s Mark)";
      document.getElementById('status-text').style.color = "#8b5cf6";
    }, 2000);

    setTimeout(() => {
      document.getElementById('status-text').textContent = "Step 2: Rendering! (4s Mark)";
      document.getElementById('status-text').style.color = "#06b6d4";
    }, 4000);
  </script>
</body>
</html>
